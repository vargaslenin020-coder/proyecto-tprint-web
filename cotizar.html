<section class="hero">
    <h2>Solicita tu cotización</h2>

    <form id="formulario">
    <input type="text" id="nombre" placeholder="Nombre" required><br><br>
    <input type="email" id="correo" placeholder="Correo" required><br><br>
    <textarea id="mensaje" placeholder="Describe tu pedido" required></textarea><br><br>
    <button type="submit">Enviar por WhatsApp</button>
</form>
</section>
<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let mensaje = document.getElementById("mensaje").value;

    let texto = "Hola, soy " + nombre + "%0A" +
                "Correo: " + correo + "%0A" +
                "Pedido: " + mensaje;

    let numero = "593987752653"; 

    let url = "https://wa.me/" + numero + "?text=" + texto;

    window.open(url, "_blank");
});
</script>
